<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3D Quick Look</title>
    <style>
      :root {
        color-scheme: dark;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #1c1c1e;
      }
      #app {
        width: 100vw;
        height: 100vh;
      }
      canvas {
        display: block;
      }
      /* loading / error overlay */
      #overlay {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 12px;
        font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        color: rgba(255, 255, 255, 0.7);
        font-size: 13px;
        pointer-events: none;
        transition: opacity 0.3s ease;
      }
      #overlay.hidden {
        opacity: 0;
      }
      .spinner {
        width: 28px;
        height: 28px;
        border: 3px solid rgba(255, 255, 255, 0.15);
        border-top-color: rgba(255, 255, 255, 0.7);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      #overlay.error .spinner {
        display: none;
      }
      #overlay.error {
        color: #ff6b6b;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="overlay">
      <div class="spinner"></div>
      <div id="overlay-text">Loading…</div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
